name: Generate PVD Report

on:
  # Triggered by Power Automate via a repository_dispatch event
  repository_dispatch:
    types: [generate_pvd_report]

  # Allow manual runs from the GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl reportlab requests

      - name: Run PVD report generator
        env:
          TENANT_ID:     ${{ secrets.TENANT_ID }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: python generate_pvd_report.py
